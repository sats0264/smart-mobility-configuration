# Default properties for smart-mobility-gateway-01 (served by config server)
spring.application.name=smart-mobility-gateway-01
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/smart-mobility

# Gateway discovery locator
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

# Gateway routes
spring.cloud.gateway.server.webflux.routes[0].id=user-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://user-mobility-pass-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/users/**

spring.cloud.gateway.server.webflux.routes[1].id=trip-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://trip-management-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/trips/**

spring.cloud.gateway.server.webflux.routes[2].id=pricing-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://pricing-discount-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/pricing/**

spring.cloud.gateway.server.webflux.routes[3].id=billing-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://billing-service
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/accounts/**

spring.cloud.gateway.server.webflux.routes[4].id=catalog-service
spring.cloud.gateway.server.webflux.routes[4].uri=lb://smart-mobility-user-service
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/catalog/**

spring.cloud.gateway.server.webflux.routes[5].id=notification-service
spring.cloud.gateway.server.webflux.routes[5].uri=lb://notification-service
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/notifications/**

spring.cloud.gateway.server.webflux.routes[6].id=admin-user-service
spring.cloud.gateway.server.webflux.routes[6].uri=lb://user-mobility-pass-service
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/admin/users/**

spring.cloud.gateway.server.webflux.routes[7].id=admin-billing-service
spring.cloud.gateway.server.webflux.routes[7].uri=lb://billing-service
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/admin/billing/**

spring.cloud.gateway.server.webflux.routes[8].id=admin-pricing-service
spring.cloud.gateway.server.webflux.routes[8].uri=lb://pricing-discount-service
spring.cloud.gateway.server.webflux.routes[8].predicates[0]=Path=/admin/pricing/**

spring.cloud.gateway.server.webflux.routes[9].id=admin-trip-service
spring.cloud.gateway.server.webflux.routes[9].uri=lb://trip-management-service
spring.cloud.gateway.server.webflux.routes[9].predicates[0]=Path=/admin/trips/**

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.cloud.gateway=DEBUG

# Server
server.port=8765
server.address=0.0.0.0

# Eureka
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.instance.preferIpAddress=true
eureka.instance.instance-id=${spring.cloud.client.ip-address}:${spring.application.name}:${server.port}
eureka.instance.ip-address=${spring.cloud.client.ip-address}
